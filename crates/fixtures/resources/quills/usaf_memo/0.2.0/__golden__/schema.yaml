main:
  fields:
    attachments:
      type: array
      description: >-
        List attachments in the order they are mentioned in the memo. Briefly describe
        each; do not use 'as stated' or abbreviations.
      default: []
      example:
      - Attachment description, YYYY MMM DD
      ui:
        group: Additional
        order: 13
      items:
        type: string
    cc:
      type: array
      description: List office symbols of recipients to receive copies.
      default: []
      example:
      - Rank and Name, ORG/SYMBOL
      ui:
        group: Additional
        order: 11
      items:
        type: string
    classification:
      type: string
      description: >-
        Select the classification marking displayed in the header/footer banner. Banner
        colors follow DoD/CAPCO marking guidance (UNCLASSIFIED green, CUI/CONFIDENTIAL
        black, SECRET red, TOP SECRET orange). Follow AFI 31-401 and applicable DoD
        guidance. Leave blank to omit the banner.
      default: ""
      ui:
        group: Additional
        order: 17
        compact: true
      enum:
      - ""
      - UNCLASSIFIED
      - CUI
      - CONFIDENTIAL
      - SECRET
      - TOP SECRET
    date:
      type: datetime
      description: YYYY-MM-DD. Leave blank to use today's date.
      default: ""
      ui:
        group: Additional
        order: 16
        compact: true
    dissemination:
      type: string
      description: >-
        Optional marking appended after double slash (e.g. NF with classification CUI
        renders as CUI//NF). Leave blank to show only the classification with no //.
      default: ""
      ui:
        group: Additional
        order: 18
        compact: true
    distribution:
      type: array
      description: >-
        Complete list of recipients if 'SEE DISTRIBUTION' is used in the 'Memo For'
        field.
      default: []
      example:
      - ORG1/SYMBOL
      - ORG2/SYMBOL
      ui:
        group: Additional
        order: 12
      items:
        type: string
    font_size:
      type: number
      description: Font size for the memo text (pt). Decimal values (e.g. 11.5) are supported.
      default: 12
      example: 12
      ui:
        group: Additional
        order: 15
        compact: true
    freedom250:
      type: boolean
      description: >-
        Show the America 250 / Freedom 250 commemorative emblem in the letterhead,
        mirrored opposite the seal.
      default: false
      ui:
        group: Letterhead
        order: 9
        compact: true
    letterhead_caption:
      type: array
      description: The full organization name of your unit.
      default:
      - HEADQUARTERS [UNIT NAME]
      ui:
        group: Letterhead
        order: 5
      items:
        type: string
    letterhead_seal:
      type: string
      description: >-
        Department of War (DoW) or Department of Defense (DoD) seal shown in the
        letterhead.
      default: dow
      ui:
        group: Letterhead
        order: 6
        compact: true
      enum:
      - dow
      - dod
    letterhead_seal_subtitle:
      type: string
      description: Optional line below the DoW seal (bold caps). Leave blank to omit.
      default: ""
      ui:
        group: Letterhead
        order: 7
        compact: true
    letterhead_title:
      type: string
      description: Standard title. Only change for Joint Commands or DoW Agencies.
      default: DEPARTMENT OF THE AIR FORCE
      ui:
        group: Letterhead
        order: 4
    memo_for:
      type: array
      description: >-
        Organization/office symbol in UPPERCASE. To address a specific person, add
        their rank and name in parentheses (e.g., 'ORG/SYMBOL (LT COL JANE DOE)'). For
        numerous recipients, use 'DISTRIBUTION'.
      default: []
      example:
      - ORG1/SYMBOL
      - ORG2/SYMBOL
      ui:
        group: Addressing
        order: 0
      items:
        type: string
    memo_from:
      type: array
      description: >-
        If recipients are on the same installation, use only the office symbol. For
        recipients on other installations, include the full mailing address to enable return
        correspondence. Omit entirely to produce a Memorandum for Record (no MEMO FROM
        line).
      default: []
      example:
      - ORG/SYMBOL
      - Organization Name
      - 123 Street Ave
      - City ST 12345-6789
      ui:
        group: Addressing
        order: 1
      items:
        type: string
    memo_style:
      type: string
      description: >-
        USAF memorandum (default) or DAF headquarters memorandum. DAF changes date
        formatting and body paragraph layout per AFH 33-337.
      default: usaf
      ui:
        group: Additional
        order: 14
        compact: true
      enum:
      - usaf
      - daf
    references:
      type: array
      description: Cite by organization, type, date, and title.
      default: []
      example:
      - AFM 33-326, 31 July 2019, Preparing Official Communications
      ui:
        group: Additional
        order: 10
      items:
        type: string
    signature_block:
      type: array
      description: "Line 1: Name in UPPERCASE as signed, grade, and service. Line 2: Duty title. Spell out 'Colonel' and general officer ranks."
      default: []
      example:
      - FIRST M. LAST, Rank, USSF
      - Duty Title
      ui:
        group: Addressing
        order: 3
      items:
        type: string
    subject:
      type: string
      description: >-
        Be brief and clear. Capitalize the first letter of each word except articles,
        prepositions, and conjunctions. Include suspense dates in parentheses if
        applicable.
      default: ""
      example: Subject of the Memorandum
      ui:
        group: Addressing
        order: 2
    tag_line:
      type: string
      description: Organizational motto at the bottom of the page.
      default: ""
      ui:
        group: Letterhead
        order: 8
        compact: true
  body:
    example: |
      The first paragraph. Top-level paragraphs are auto-numbered; do not add manual numbering.
      
      - Nested bullets are automatically lettered.
card_kinds:
  indorsement:
    description: >-
      Chain of routing endorsements. Each endorsement block adds an official response
      or forwarding action to the original memo.
    fields:
      action:
        type: string
        description: >-
          Action taken by the endorser. Leave blank to hide the Approve/Disapprove line
          entirely, 'undecided' to display the line with neither option circled, 'approve'
          or 'disapprove' to circle the selected option.
        default: ""
        ui:
          group: Addressing
          order: 4
        enum:
        - ""
        - undecided
        - approve
        - disapprove
      attachments:
        type: array
        description: List of attachments specific to this endorsement.
        default: []
        ui:
          group: Additional
          order: 5
        items:
          type: string
      cc:
        type: array
        description: List of office symbols to receive copies of this endorsement.
        default: []
        ui:
          group: Additional
          order: 6
        items:
          type: string
      date:
        type: datetime
        description: >-
          YYYY-MM-DD. Date the endorser signs/forwards the memo (per AFH 33-337 Ch. 14,
          this is distinct from the originating memo's date). Leave blank to use today's
          date.
        default: ""
        ui:
          group: Additional
          order: 7
      for:
        type: string
        description: Office symbol or organization receiving the endorsed memo.
        default: ORG/SYMBOL
        ui:
          group: Addressing
          order: 1
      format:
        type: string
        description: "Format style: 'standard' (formal on same page), 'informal' (less formal routing), or 'separate_page' (starts on new page)."
        default: standard
        ui:
          group: Additional
          order: 3
        enum:
        - standard
        - informal
        - separate_page
      from:
        type: string
        description: Office symbol or Rank Name of the endorsing official (e.g., 'ORG/SYMBOL').
        default: ORG/SYMBOL
        ui:
          group: Addressing
          order: 0
      signature_block:
        type: array
        description: "Line 1: Name in UPPERCASE as signed, grade, and service. Line 2: Duty title."
        default:
        - FIRST M. LAST, Rank, USAF
        - Duty Title
        example:
        - FIRST M. LAST, Rank, USAF
        - Duty Title
        ui:
          group: Addressing
          order: 2
        items:
          type: string
    ui:
      title: Routing indorsement
