quill:
  name: classic_resume
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  example_file: example.md
  description: A clean and modern classic resume template.

main:
  fields:
    name:
      type: string
      required: true
      example: John Doe
      ui:
        group: Personal Info

    contacts:
      type: array
      required: true
      example:
        - john.doe@example.com
        - 123-456-7890
        - linkedin.com/in/johndoe
      ui:
        group: Personal Info
      description: List of contact details (email, phone, links, etc.)

card_types:
  experience_section:
    description: An entry with a heading, subheading, and bullet points.
    ui:
      title: "{headingLeft} — {subheadingLeft}"
    fields:
      title:
        type: string
        default: Experience
      headingLeft:
        type: string
        required: true
      headingRight:
        type: string
      subheadingLeft:
        type: string
      subheadingRight:
        type: string

  skills_section:
    description: A grid of skill categories with key-value pairs.
    body:
      enabled: false
    fields:
      title:
        type: string
        default: Skills
      cells:
        type: array
        required: true
        example:
          - category: Languages
            skills: Python, Rust, C++
          - category: DevOps
            skills: Docker, Kubernetes
        items:
          type: object
          properties:
            category:
              type: string
              required: true
            skills:
              type: string
              required: true

  projects_section:
    description: A project entry with a name and optional URL.
    ui:
      title: "{name}"
    fields:
      title:
        type: string
        default: Projects
      name:
        type: string
        required: true
      url:
        type: string

  certifications_section:
    description: A grid of certifications.
    body:
      enabled: false
    fields:
      title:
        type: string
        default: Certifications
      cells:
        type: array
        required: true
        example:
          - AWS Certified Solutions Architect
          - CKA
          - OSCP
