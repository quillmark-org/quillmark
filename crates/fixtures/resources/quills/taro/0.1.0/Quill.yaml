quill:
  name: taro
  version: 0.1.0
  backend: typst
  plate_file: plate.typ
  description: A simple document template for testing

main:
  fields:
    author:
      description: Author of document
      type: string
    ice_cream:
      description: favorite ice cream flavor
      type: string
      default: taro
    title:
      description: title of document
      type: string

card_kinds:
  quotes:
    description: A collection of quotes about taro ice cream
    ui:
      title: Inspirational Quotes
    fields:
      author:
        description: The person who said this quote
        type: string
