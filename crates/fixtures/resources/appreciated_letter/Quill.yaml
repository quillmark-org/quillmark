quill:
  name: appreciated_letter
  version: "0.1"
  backend: typst
  main_file: main.typ
  example_file: appreciated_letter.md
  description: Professional letter template with appreciation styling

cards:
  main:
    fields:
      sender:
        description: Sender of letter
        type: string
      recipient:
        description: Recipient of letter
        type: string
      date:
        description: Date of letter
        type: string
      subject:
        description: Subject of letter
        type: string
      name:
        description: Name of sender
        type: string
