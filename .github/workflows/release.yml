name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  # ──────────────────────────────────────────────
  # Prepare: tag the release commit and cut a GitHub Release
  # Only runs when a release PR (release/vX.Y.Z) is merged to main.
  # ──────────────────────────────────────────────
  prepare:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.next }}
    steps:
      # App token is required because the tag-creation ruleset blocks GITHUB_TOKEN.
      - name: Generate token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAGGER_APP_ID }}
          private-key: ${{ secrets.TAGGER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app.outputs.token }}

      - name: Read workspace version
        id: version
        run: |
          NEXT=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "quillmark") | .version')
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Releasing v${NEXT}"

      - name: Tag and push
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          if [[ "$VERSION" == *-* ]]; then
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Pre-release v${VERSION}" \
              --prerelease
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}" \
              --latest
          fi

  # ──────────────────────────────────────────────
  # Publish: Rust crates → crates.io
  # ──────────────────────────────────────────────
  publish-crates:
    needs: [prepare]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io (Trusted Publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish workspace crates
        run: cargo publish --locked --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  # ──────────────────────────────────────────────
  # Publish: WASM → npm
  # ──────────────────────────────────────────────
  publish-wasm:
    needs: [prepare]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Restore WASM build cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            target/wasm32-unknown-unknown/wasm-release
            pkg
          # Namespaced under wasm-release- so a CI cache (wasm-ci-...) can
          # never satisfy this restore — that would publish an unoptimized
          # bundle to npm.
          key: wasm-release-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/**/*.rs') }}
          restore-keys: |
            wasm-release-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install wasm-bindgen-cli
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM packages
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-wasm.sh

      - name: Install npm test dependencies
        working-directory: crates/bindings/wasm
        run: npm install

      - name: Run WASM tests
        working-directory: crates/bindings/wasm
        run: npx vitest run

      - name: Upgrade npm for Trusted Publishers
        run: npm install -g npm@latest

      - name: Publish @quillmark/wasm
        working-directory: pkg
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi

  # ──────────────────────────────────────────────
  # Publish: Python → PyPI
  # ──────────────────────────────────────────────
  build-python-linux:
    needs: [prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          manylinux: auto
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/bindings/python/dist/*.whl

  build-python-windows:
    needs: [prepare]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: crates/bindings/python/dist/*.whl

  build-python-macos:
    needs: [prepare]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --interpreter 3.10 3.11 3.12
          sccache: 'true'
          working-directory: crates/bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: crates/bindings/python/dist/*.whl

  build-python-sdist:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/bindings/python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/bindings/python/dist/*.tar.gz

  publish-python:
    needs: [prepare, build-python-linux, build-python-windows, build-python-macos, build-python-sdist]
    runs-on: ubuntu-latest
    environment: Publish
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
