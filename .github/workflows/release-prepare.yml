name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - patch-rc
          - minor-rc
          - major-rc
          - rc
          - promote-rc

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # App token is required so CI runs on the bot-opened PR.
      # PRs opened with the default GITHUB_TOKEN do not trigger workflow events.
      - name: Generate token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAGGER_APP_ID }}
          private-key: ${{ secrets.TAGGER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "quillmark") | .version')

          # Strip any pre-release suffix before splitting on '.' so that
          # PATCH isn't "0-rc.1" when the current version is e.g. 0.81.0-rc.1.
          BASE_VERSION="${CURRENT%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          case "${{ inputs.bump }}" in
            major)      NEXT="$((MAJOR + 1)).0.0" ;;
            minor)      NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch)      NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            major-rc)   NEXT="$((MAJOR + 1)).0.0-rc.1" ;;
            minor-rc)   NEXT="${MAJOR}.$((MINOR + 1)).0-rc.1" ;;
            patch-rc)   NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-rc.1" ;;
            rc)
              if [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc\.([0-9]+)$ ]]; then
                NEXT="${BASH_REMATCH[1]}-rc.$((BASH_REMATCH[2] + 1))"
              else
                echo "Error: current version '$CURRENT' is not an RC version; cannot bump RC." >&2
                exit 1
              fi
              ;;
            promote-rc)
              if [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
                NEXT="${BASH_REMATCH[1]}"
              else
                echo "Error: current version '$CURRENT' is not an RC version; cannot promote." >&2
                exit 1
              fi
              ;;
          esac

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT"

      - name: Bump workspace versions
        run: |
          cargo release version "${{ steps.version.outputs.next }}" \
            --workspace \
            --no-confirm \
            --execute

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(release): v${VERSION}" \
            --body "Automated version bump to \`v${VERSION}\`. Merging this PR will tag and publish the release." \
            --base main \
            --head "$BRANCH"
