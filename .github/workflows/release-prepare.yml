name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (ignored while iterating an existing RC, or when version_override is set)
        required: true
        type: choice
        options:
          - patch
          - minor
      release_candidate:
        description: Cut a release candidate (-rc.N) instead of a final release
        required: false
        type: boolean
        default: false
      version_override:
        description: Explicit next version (e.g. 0.94.0), used verbatim and overriding bump — set to skip a minor
        required: false
        type: string
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # App token is required so CI runs on the bot-opened PR.
      # PRs opened with the default GITHUB_TOKEN do not trigger workflow events.
      - name: Generate token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAGGER_APP_ID }}
          private-key: ${{ secrets.TAGGER_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "quillmark") | .version')

          RC="${{ inputs.release_candidate }}"
          OVERRIDE="${{ inputs.version_override }}"

          if [[ -n "$OVERRIDE" ]]; then
            # Explicit target (e.g. skip a minor): used verbatim; the checkbox
            # still decides whether to cut it as a fresh -rc.1.
            NEXT="$OVERRIDE"
            if [[ "$RC" == "true" && "$NEXT" != *-rc.* ]]; then
              NEXT="${NEXT}-rc.1"
            fi
          elif [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc\.([0-9]+)$ ]]; then
            # Already an RC: the target base version is fixed, so `bump` is
            # ignored. The checkbox decides whether to iterate or promote.
            RC_BASE="${BASH_REMATCH[1]}"
            RC_NUM="${BASH_REMATCH[2]}"
            if [[ "$RC" == "true" ]]; then
              NEXT="${RC_BASE}-rc.$((RC_NUM + 1))"
            else
              NEXT="${RC_BASE}"
            fi
          else
            # Not an RC: apply the chosen bump, optionally as a fresh -rc.1.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
            if [[ "$RC" == "true" ]]; then
              NEXT="${NEXT}-rc.1"
            fi
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT"

      - name: Bump workspace versions
        run: |
          cargo release version "${{ steps.version.outputs.next }}" \
            --workspace \
            --no-confirm \
            --execute

      - name: Seed changelog entry
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          DATE=$(date +%Y-%m-%d)

          # Changelog baseline: latest strict semver X.Y.Z tag (optional v
          # prefix). Pre-release tags (e.g. v0.85.0-rc.1) are skipped so the
          # commit range covers everything since the last final release.
          LAST=$(git tag -l --sort=-v:refname \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)

          [ -f CHANGELOG.md ] || printf '# Changelog\n\n' > CHANGELOG.md

          # Defense in depth: a seed comment from a prior cycle should already
          # be gone (release.yml strips it once that release publishes), but
          # splicing a new section must never build on top of one that
          # survived.
          ./scripts/strip-seed-comment.sh CHANGELOG.md

          # A curated "## Unreleased" section is the seed body: its entries
          # become the version section (and the GitHub Release notes), with the
          # raw commit list riding below in an HTML comment as a coverage
          # cross-check — invisible in rendered notes if left unedited. With no
          # curated section, the commit list is the seed body itself.
          # Only the first "## Unreleased" is consumed; any later one is
          # stray data and passes through untouched rather than corrupting
          # the seed.
          awk '!done && /^## Unreleased$/{f=1; done=1; next} /^## /{f=0} f' CHANGELOG.md > unreleased.md
          awk '!done && /^## Unreleased$/{f=1; done=1; next} /^## /{f=0} !f' CHANGELOG.md > CHANGELOG.stripped

          {
            echo "## v${VERSION} - ${DATE}"
            echo
            if grep -q '[^[:space:]]' unreleased.md; then
              sed -e '/./,$!d' unreleased.md
              echo "<!-- seed: commits since ${LAST:-the first commit} — confirm the entries above cover them, then delete this comment"
              git log --no-merges --pretty='- %s' ${LAST:+"${LAST}..HEAD"}
              echo "-->"
            else
              git log --no-merges --pretty='- %s' ${LAST:+"${LAST}..HEAD"}
            fi
            echo
          } > entry.md

          # Splice the new section in directly after the "# Changelog" title.
          { head -n1 CHANGELOG.stripped; echo; cat entry.md; tail -n +2 CHANGELOG.stripped; } \
            > CHANGELOG.new && mv CHANGELOG.new CHANGELOG.md
          rm -f entry.md unreleased.md CHANGELOG.stripped

          echo "Seeded changelog entry for v${VERSION}:"
          cat CHANGELOG.md

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(release): v${VERSION}" \
            --body "Automated version bump to \`v${VERSION}\`.

          **Before merging:** review and edit the \`v${VERSION}\` section at the top of \`CHANGELOG.md\` on this branch — seeded from the curated \`## Unreleased\` section when one exists (raw commits ride in an HTML comment as a coverage check), else from the raw commit list. The final section becomes the GitHub Release notes.

          Merging this PR will tag and publish the release." \
            --base main \
            --head "$BRANCH"
