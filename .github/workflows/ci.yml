name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - 'v**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy check
        run: cargo clippy --all-features --all-targets --locked -- -D warnings

      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --no-deps --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Tests
        run: cargo test --workspace --all-features --locked

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify core build excludes Typst
        # `cargo tree -i` exits 0 only when quillmark-typst IS in the no-features
        # graph — i.e. a leak. The release size budget catches this too, but only
        # on release; behavioural tests never see it (a leak doesn't change the
        # API, just bloats the bundle ~12x). This is the PR-level guard.
        run: |
          if cargo tree -p quillmark-wasm --no-default-features \
               --target wasm32-unknown-unknown -i quillmark-typst >/dev/null 2>&1; then
            echo "::error::quillmark-typst leaked into the core (no-default-features) build"
            exit 1
          fi
          echo "OK: quillmark-typst absent from the core feature graph"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache WASM build output
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            target/wasm32-unknown-unknown/wasm-ci
            pkg
          # Namespaced cache key: never share artifacts with the release
          # workflow, which builds with the size-optimized wasm-release
          # profile and publishes pkg/ to npm. The key hashes every input
          # baked into pkg/, not just Rust sources — the runtime sidecar and
          # package.json template that build-wasm.sh copies in, plus the
          # helper template and fonts embedded via include_str!/include_bytes!
          # — so an edit to any of them rebuilds instead of serving a stale
          # pkg/ to vitest and the typecheck drift guard.
          key: wasm-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/**/*.rs', 'crates/bindings/wasm/runtime/**', 'crates/bindings/wasm/package.template.json', 'crates/backends/typst/src/lib.typ.template', 'crates/backends/typst/src/fonts/**', 'scripts/build-wasm.sh') }}

      - name: Install wasm-bindgen-cli
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-wasm.sh --ci

      - name: Install npm dependencies
        working-directory: crates/bindings/wasm
        run: npm install

      - name: Test WASM
        working-directory: crates/bindings/wasm
        run: npx vitest run

      - name: Typecheck WASM (canonical runtime.d.ts drift guard)
        working-directory: crates/bindings/wasm
        run: npm run typecheck

