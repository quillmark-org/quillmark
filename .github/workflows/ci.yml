name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - 'v**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # TODO: formalize Clippy later
      # - name: Clippy check
      #   run: cargo clippy --all-features --all-targets --locked -- -D warnings

      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --no-deps --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Tests
        run: cargo test --workspace --all-features --locked

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache WASM build output
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            target/wasm32-unknown-unknown/wasm-ci
            pkg
          # Namespaced cache key: never share artifacts with the release
          # workflow, which builds with the size-optimized wasm-release
          # profile and publishes pkg/ to npm.
          key: wasm-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'crates/**/*.rs') }}

      - name: Install wasm-bindgen-cli
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-wasm.sh --ci

      - name: Install npm dependencies
        working-directory: crates/bindings/wasm
        run: npm install

      - name: Test WASM
        working-directory: crates/bindings/wasm
        run: npx vitest run

  ci-success:
    runs-on: ubuntu-latest
    needs: [lint, test, wasm]
    if: ${{ always() }}
    steps:
      - name: Fail if any dependency did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: exit 1