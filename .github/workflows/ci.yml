name: CI

on:
  pull_request:
  push:
    tags-ignore:
      - 'v**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Clippy is intentionally NOT gated here. A clippy gate was tried
      # (a11caa45), the tree made clippy-clean, then the gate removed
      # (68c3751a) as not worth the CI time; `cargo doc -Dwarnings` is the
      # standing lint gate. Do not re-add a "make clippy clean" pass expecting
      # CI to enforce it — record the policy change here first if that changes.
      - name: Build docs
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --no-deps --locked

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Tests
        run: cargo test --workspace --all-features --locked

  release-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Guards scripts/strip-seed-comment.sh, the tool release.yml and
      # release-prepare.yml rely on to keep the release-prepare coverage
      # comment out of published Release notes and merged CHANGELOG.md.
      - name: Test strip-seed-comment.sh strips the comment and collapses to one blank line
        run: |
          printf '## v1.0.0 - 2026-01-01\n\n- entry one\n\n<!-- seed: commits since v0.9.0 — confirm the entries above cover them, then delete this comment\n- commit a\n- commit b\n-->\n\n## v0.9.0 - 2025-12-01\n\n- old entry\n' > fixture.md
          printf '## v1.0.0 - 2026-01-01\n\n- entry one\n\n## v0.9.0 - 2025-12-01\n\n- old entry\n' > fixture.expected.md
          ./scripts/strip-seed-comment.sh fixture.md
          diff fixture.expected.md fixture.md

      - name: Test strip-seed-comment.sh is a no-op without a seed comment
        run: |
          printf '## v1.0.0 - 2026-01-01\n\n- entry one\n' > clean.md
          cp clean.md clean.expected.md
          ./scripts/strip-seed-comment.sh clean.md
          diff clean.expected.md clean.md

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify core build excludes Typst
        # `cargo tree -i` exits 0 only when quillmark-typst IS in the no-features
        # graph — i.e. a leak. The release size budget catches this too, but only
        # on release; behavioural tests never see it (a leak doesn't change the
        # API, just bloats the bundle ~12x). This is the PR-level guard.
        run: |
          if cargo tree -p quillmark-wasm --no-default-features \
               --target wasm32-unknown-unknown -i quillmark-typst >/dev/null 2>&1; then
            echo "::error::quillmark-typst leaked into the core (no-default-features) build"
            exit 1
          fi
          echo "OK: quillmark-typst absent from the core feature graph"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache WASM cargo build
        uses: actions/cache@v4
        with:
          # Cache only the wasm cargo build dir — not pkg/. build-wasm.sh always
          # regenerates pkg/ from a warm target/ (a quick incremental rebuild +
          # wasm-bindgen), so pkg/ never needs to survive across runs, no pkg
          # inputs need enumerating in the key, and no stale pkg/ can be served
          # to vitest or the typecheck drift guard. Namespaced to wasm-ci so it
          # never mixes with the release workflow's size-optimized wasm-release
          # build. Cargo's own incremental staleness handles source edits within
          # a restored target/, so the key only busts on a dependency change.
          path: target/wasm32-unknown-unknown/wasm-ci
          key: wasm-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            wasm-ci-${{ runner.os }}-

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.118

      - name: Build WASM
        run: ./scripts/build-wasm.sh --ci

      - name: Install npm dependencies
        working-directory: crates/bindings/wasm
        run: npm install

      - name: Test WASM
        working-directory: crates/bindings/wasm
        run: npx vitest run

      - name: Typecheck WASM (canonical runtime.d.ts drift guard)
        working-directory: crates/bindings/wasm
        run: npm run typecheck

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # `maturin develop` builds the pyo3 extension in the DEBUG (dev) profile —
      # far faster to compile than the release build a `pip install -e` (maturin
      # PEP-517 default) would trigger, and opt-level is irrelevant to test
      # outcomes. Matches `cargo test --workspace` (also debug) and the documented
      # dev flow (CLAUDE.md / README). The top-level CARGO_PROFILE_DEV_DEBUG=0 env
      # strips debuginfo, so this stays lean.
      - name: Build extension (debug)
        working-directory: crates/bindings/python
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install pytest maturin
          maturin develop

      - name: Test Python
        working-directory: crates/bindings/python
        run: .venv/bin/pytest -q

