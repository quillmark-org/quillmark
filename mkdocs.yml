site_name: Quillmark
site_description: A format-first Markdown rendering system
site_url: https://quillmark-org.github.io/quillmark
repo_url: https://github.com/quillmark-org/quillmark
repo_name: quillmark-org/quillmark
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Authoring:
      - Markdown Syntax: authoring/markdown-syntax.md
      - card-yaml Blocks: authoring/card-yaml.md
      - Cards: authoring/cards.md
  - Quills:
      - Creating Quills: format-designer/creating-quills.md
      - Quill.yaml Reference: format-designer/quill-yaml-reference.md
      - Typst Backend: format-designer/typst-backend.md
      - Versioning: format-designer/versioning.md
  - CLI:
      - Reference: cli/reference.md
  - Migration:
      - 0.82 → 0.83 ($-prefixed plate JSON): migrations/0.82-to-0.83.md
      - 0.81 → 0.82 (card-yaml): migrations/0.81-to-0.82.md
      - WASM 0.77 → 0.80: migrations/wasm-0.77-to-0.80.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
