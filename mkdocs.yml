site_name: Quillmark
site_description: A schema-driven document engine
site_url: https://borb-sh.github.io/quillmark
repo_url: https://github.com/borb-sh/quillmark
repo_name: borb-sh/quillmark
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Authoring:
      - Markdown Syntax: authoring/markdown-syntax.md
      - card-yaml Blocks: authoring/card-yaml.md
  - Quills:
      - Creating Quills: quills/creating-quills.md
      - Quill.yaml Reference: quills/quill-yaml-reference.md
      - Blueprint & Seeding: quills/blueprint.md
      - Typst Backend: quills/typst-backend.md
      - PDF Form Backend: quills/pdfform-backend.md
      - Versioning: quills/versioning.md
  - Integrating:
      - Overview: integration/index.md
      - Programmatic Construction: integration/programmatic.md
      - Error Handling: integration/error-handling.md
      - Persistence: integration/persistence.md
  - CLI:
      - Reference: cli/reference.md
  - Reference:
      - Markdown Specification: reference/markdown-spec.md
  - Migration:
      - Overview: migrations/index.md
      - 0.96 → 0.97 (WASM Document.get → getStored; verbatim transport read gains its own verb): migrations/0.96-to-0.97.md
      - '0.95 → 0.96 (mutator edit:: codes; [EditError::…] prefix deleted; DocPath parser; null ≡ absent ratified)': migrations/0.95-to-0.96.md
      - 0.94 → 0.95 (store* verbs; one WASM address; quill.view; RichText → Content; strict date/datetime): migrations/0.94-to-0.95.md
      - 0.93 → 0.94 (richtext(inline) token retires; ui.order removed, declaration order is the ordering contract): migrations/0.93-to-0.94.md

# Superseded migration guides stay published — reachable from the Migration
# overview and by URL — but are lifted out of the nav to keep it current.
not_in_nav: |
  /migrations/wasm-0.77-to-0.80.md
  /migrations/0.81-to-0.82.md
  /migrations/0.82-to-0.83.md
  /migrations/0.83-to-0.84.md
  /migrations/0.85-to-0.86.md
  /migrations/0.86-to-0.87.md
  /migrations/0.87-to-0.88.md
  /migrations/0.88-to-0.89.md
  /migrations/0.89-to-0.90.md
  /migrations/0.90-to-0.91.md
  /migrations/0.91-to-0.92.md
  /migrations/0.92-to-0.93.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
