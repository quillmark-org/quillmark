site_name: Quillmark
site_description: A format-first Markdown rendering system
site_url: https://quillmark-org.github.io/quillmark
repo_url: https://github.com/quillmark-org/quillmark
repo_name: quillmark-org/quillmark
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Concepts: getting-started/concepts.md
  - Authoring:
      - Markdown Syntax: authoring/markdown-syntax.md
      - card-yaml Blocks: authoring/card-yaml.md
      - Cards: authoring/cards.md
  - Quills:
      - Creating Quills: quills/creating-quills.md
      - Quill.yaml Reference: quills/quill-yaml-reference.md
      - Typst Backend: quills/typst-backend.md
      - Versioning: quills/versioning.md
  - CLI:
      - Reference: cli/reference.md
  - Reference:
      - Markdown Specification: reference/markdown-spec.md
  - Migration:
      - Overview: migrations/index.md
      - 0.87 → 0.88 (form view removed; field_absent/Unendorsed; example → seed): migrations/0.87-to-0.88.md
      - 0.86 → 0.87 (typed arrays via items, unified datetime): migrations/0.86-to-0.87.md
      - 0.85 → 0.86 (bare ~~~ card-yaml fence): migrations/0.85-to-0.86.md
      - 0.83 → 0.84 (Must Fill / Endorsed, Python parity): migrations/0.83-to-0.84.md
      - 0.82 → 0.83 ($-prefixed plate JSON): migrations/0.82-to-0.83.md
      - 0.81 → 0.82 (card-yaml): migrations/0.81-to-0.82.md
      - WASM 0.77 → 0.80: migrations/wasm-0.77-to-0.80.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
